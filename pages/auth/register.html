<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Register - BellaBliss Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: #e11d48;
            outline: none;
        }
        
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .role-option {
            flex: 1;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .role-option:hover {
            border-color: #e11d48;
            background: #fef2f2;
        }
        
        .role-option.selected {
            border-color: #e11d48;
            background: #fef2f2;
        }
        
        .role-option i {
            font-size: 24px;
            color: #e11d48;
            margin-bottom: 5px;
        }
        
        .btn-register {
            background: #e11d48;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: #be123c;
        }
        
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <!-- Logo -->
        <div class="text-center mb-6">
            <a href="../../index.html" class="text-2xl font-bold">
                <span class="text-rose-600">Bella</span><span class="text-gray-800">Bliss</span>
            </a>
            <h2 class="text-xl font-bold mt-4">Create Account</h2>
            <p class="text-gray-500 text-sm">Join BellaBliss Studio today</p>
        </div>
        
        <!-- Role Selection -->
        <div class="role-selector">
            <div class="role-option selected" id="customerRole" onclick="selectRole('customer')">
                <i class="fas fa-user"></i>
                <div>Customer</div>
            </div>
            <div class="role-option" id="professionalRole" onclick="selectRole('professional')">
                <i class="fas fa-briefcase"></i>
                <div>Professional</div>
            </div>
        </div>
        
        <!-- Register Form -->
        <form id="registerForm">
            <!-- Name -->
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Full Name" required>
            </div>
            
            <!-- Email -->
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            
            <!-- Phone -->
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            
            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required minlength="6">
            </div>
            
            <!-- Confirm Password -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            
            <!-- Professional Fields (Hidden by default) -->
            <div id="professionalFields" style="display: none;">
                <div class="input-group">
                    <i class="fas fa-tag"></i>
                    <select id="specialization">
                        <option value="">Select Specialization</option>
                        <option value="Makeup Artist">Makeup Artist</option>
                        <option value="Hair Stylist">Hair Stylist</option>
                        <option value="Facial Specialist">Facial Specialist</option>
                        <option value="Nail Artist">Nail Artist</option>
                        <option value="Bridal Makeup">Bridal Makeup</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-star"></i>
                    <input type="number" id="experience" placeholder="Years of Experience">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-align-left"></i>
                    <textarea id="bio" placeholder="Tell us about yourself" rows="3"></textarea>
                </div>
            </div>
            
            <!-- Message Display -->
            <div id="message" class="message"></div>
            
            <!-- Terms -->
            <div class="flex items-center mb-4">
                <input type="checkbox" id="terms" class="mr-2" required>
                <label for="terms" class="text-sm text-gray-600">
                    I agree to the <a href="#" class="text-rose-600">Terms & Conditions</a>
                </label>
            </div>
            
            <!-- Register Button -->
            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus mr-2"></i>
                Register
            </button>
            
            <!-- Login Link -->
            <p class="text-center text-sm text-gray-600 mt-4">
                Already have an account? 
                <a href="login.html" class="text-rose-600 font-medium">Sign in</a>
            </p>
        </form>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        const API_BASE_URL = window.API_URL || 'http://localhost:5000/api';

        async function parseApiResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return response.json();
            }

            const text = await response.text();
            return {
                success: response.ok,
                message: text || 'Unexpected server response'
            };
        }

        // Initialize role
        let currentRole = 'customer';

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }
        
        // Check URL parameter for role
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        if (roleParam === 'professional') {
            currentRole = 'professional';
            document.getElementById('professionalRole').classList.add('selected');
            document.getElementById('customerRole').classList.remove('selected');
            document.getElementById('professionalFields').style.display = 'block';
        }
        
        function selectRole(role) {
            currentRole = role;
            
            if (role === 'customer') {
                document.getElementById('customerRole').classList.add('selected');
                document.getElementById('professionalRole').classList.remove('selected');
                document.getElementById('professionalFields').style.display = 'none';
            } else {
                document.getElementById('professionalRole').classList.add('selected');
                document.getElementById('customerRole').classList.remove('selected');
                document.getElementById('professionalFields').style.display = 'block';
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            
            // Auto hide success message
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = normalizeEmail(document.getElementById('email').value);
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!name || !email || !phone || !password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            if (!terms) {
                showMessage('Please accept Terms & Conditions', 'error');
                return;
            }
            
            const payload = {
                name,
                email,
                phone,
                password,
                role: currentRole
            };

            if (currentRole === 'professional') {
                payload.professionalDetails = {
                    specialization: document.getElementById('specialization').value ? [document.getElementById('specialization').value] : [],
                    experience: parseInt(document.getElementById('experience').value, 10) || 0,
                    bio: document.getElementById('bio').value.trim()
                };
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await parseApiResponse(response);

                if (!response.ok || !result.success) {
                    showMessage(result.message || 'Registration failed', 'error');
                    return;
                }

                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                localStorage.setItem('lastRegisteredEmail', result.data.user.email || email);
                showMessage('Registration successful! Your account is ready.', 'success');

                setTimeout(() => {
                    if (result.data.user.role === 'professional') {
                        window.location.href = '../professional/dashboard.html';
                    } else {
                        window.location.href = '../../index.html';
                    }
                }, 1500);
            } catch (error) {
                console.error('Registration error:', error);
                showMessage(
                    error.message || 'Cannot connect to the backend server at http://localhost:5000. Start the backend and try again.',
                    'error'
                );
            }
        }
        
        // Add event listener
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
    </script>
</body>
</html>
