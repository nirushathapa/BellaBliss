<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - BellaBliss Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            border-color: #e11d48;
            outline: none;
        }
        
        .btn-login {
            background: #e11d48;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .btn-login:hover {
            background: #be123c;
        }
        
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .message.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }
        
        .admin-note {
            background: #fef2f2;
            border: 1px solid #e11d48;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .demo-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .demo-btn {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        
        .demo-btn.admin { background: #e11d48; color: white; }
        .demo-btn.pro { background: #3b82f6; color: white; }
        .demo-btn.customer { background: #10b981; color: white; }
        .demo-btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-6">
            <a href="../../index.html" class="text-2xl font-bold">
                <span class="text-rose-600">Bella</span><span class="text-gray-800">Bliss</span>
            </a>
            <h2 class="text-xl font-bold mt-4">Welcome Back</h2>
            <p class="text-gray-500 text-sm">Sign in to your account</p>
        </div>
        
        <!-- Demo Buttons -->
        <div class="demo-buttons">
            <button type="button" class="demo-btn admin" onclick="fillDemo('admin@bellabliss.com', 'admin123')">Admin</button>
            <button type="button" class="demo-btn pro" onclick="fillDemo('pro@test.com', 'password123')">Professional</button>
            <button type="button" class="demo-btn customer" onclick="fillDemo('customer@test.com', 'password123')">Customer</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <!-- Email -->
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email address" required>
            </div>
            
            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <!-- Message Display -->
            <div id="message" class="message"></div>
            
            <!-- Login Button -->
            <button type="submit" class="btn-login mb-4">
                Sign In
            </button>
            
            <!-- Register Links -->
            <div class="text-center space-y-2 text-sm">
                <p>
                    New customer? 
                    <a href="register.html?role=customer" class="text-rose-600 hover:text-rose-700 font-medium">
                        Create account
                    </a>
                </p>
                <p>
                    New professional? 
                    <a href="register.html?role=professional" class="text-rose-600 hover:text-rose-700 font-medium">
                        Join as professional
                    </a>
                </p>
            </div>
        </form>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        async function parseApiResponse(response) {
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                return response.json();
            }

            const text = await response.text();
            return {
                success: response.ok,
                message: text || 'Unexpected server response'
            };
        }

        // Fill demo account
        function fillDemo(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
        }

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }
        
        // Show message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            
            // Auto hide success message
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 2000);
            }
        }
        
        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = normalizeEmail(document.getElementById('email').value);
            const password = document.getElementById('password').value;
            
            // Validate
            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }
            
            try {
                const response = await requestFromApi('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await parseApiResponse(response);

                if (!result.success) {
                    showMessage(result.message || 'Login failed', 'error');
                    return;
                }

                const { token, user } = result.data;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('lastRegisteredEmail', user.email || email);

                showMessage('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = '../admin/dashboard.html';
                    } else if (user.role === 'professional') {
                        window.location.href = '../professional/dashboard.html';
                    } else {
                        window.location.href = '../../index.html';
                    }
                }, 1000);
            } catch (error) {
                console.error('Login error:', error);
                showMessage(
                    error.message || `Cannot connect to the backend server at ${API_URL}. Start the backend and try again.`,
                    'error'
                );
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const lastRegisteredEmail = localStorage.getItem('lastRegisteredEmail');
            if (lastRegisteredEmail) {
                document.getElementById('email').value = lastRegisteredEmail;
            }
        });

        // Add event listener
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
