<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Products - BellaBliss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-8">BellaBliss Admin</h1>
            <nav class="space-y-3">
                <a href="dashboard.html" class="block hover:bg-slate-800 px-4 py-2 rounded">Dashboard</a>
                <a href="products.html" class="block bg-rose-600 px-4 py-2 rounded">Products</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold">Products</h2>
                    <p class="text-slate-500">Create and manage storefront products</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openAddModal()" class="bg-rose-600 text-white px-4 py-2 rounded">Add Product</button>
                    <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded">Logout</button>
                </div>
            </div>

            <section class="bg-white rounded-xl shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-3 text-left">Product</th>
                                <th class="px-6 py-3 text-left">Category</th>
                                <th class="px-6 py-3 text-left">Price</th>
                                <th class="px-6 py-3 text-left">Stock</th>
                                <th class="px-6 py-3 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="productModal" class="hidden fixed inset-0 bg-black/40 items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl p-6">
            <h3 class="text-2xl font-bold mb-4" id="modalTitle">Add Product</h3>
            <form id="productForm" class="space-y-4">
                <input id="productName" class="w-full border rounded px-4 py-3" placeholder="Product name" required>
                <input id="productSlug" class="w-full border rounded px-4 py-3" placeholder="Slug" required>
                <input id="productCategory" class="w-full border rounded px-4 py-3" placeholder="Category" required>
                <textarea id="productDescription" class="w-full border rounded px-4 py-3" placeholder="Description" rows="4" required></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="productPrice" type="number" step="0.01" class="w-full border rounded px-4 py-3" placeholder="Price" required>
                    <input id="productStock" type="number" class="w-full border rounded px-4 py-3" placeholder="Stock" required>
                </div>
                <input id="productImage" class="w-full border rounded px-4 py-3" placeholder="Image URL">
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="border px-4 py-2 rounded">Cancel</button>
                    <button type="submit" class="bg-rose-600 text-white px-4 py-2 rounded">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let products = [];
        let editingId = null;

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        async function loadProducts() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!localStorage.getItem('token') || !user || user.role !== 'admin') {
                window.location.href = '../auth/login.html';
                return;
            }

            const response = await fetch(`${API_BASE_URL}/products?limit=100`);
            const result = await response.json();
            products = result.data || [];
            displayProducts();
        }

        function displayProducts() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = products.map(product => `
                <tr class="border-t">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <img src="${product.image || 'https://via.placeholder.com/60'}" class="w-12 h-12 rounded object-cover" alt="${product.name}">
                            <div>
                                <p class="font-semibold">${product.name}</p>
                                <p class="text-sm text-slate-500">${product.slug}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">${product.category}</td>
                    <td class="px-6 py-4">$${Number(product.price).toFixed(2)}</td>
                    <td class="px-6 py-4">${product.stock}</td>
                    <td class="px-6 py-4 flex gap-2">
                        <button onclick="editProduct('${product._id}')" class="text-rose-600">Edit</button>
                        <button onclick="deleteProduct('${product._id}')" class="text-red-600">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('productModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.getElementById('productModal').classList.remove('flex');
        }

        function editProduct(id) {
            const product = products.find(item => item._id === id);
            if (!product) return;
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productName').value = product.name || '';
            document.getElementById('productSlug').value = product.slug || '';
            document.getElementById('productCategory').value = product.category || '';
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productPrice').value = product.price || 0;
            document.getElementById('productStock').value = product.stock || 0;
            document.getElementById('productImage').value = product.image || '';
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('productModal').classList.add('flex');
        }

        async function saveProduct(event) {
            event.preventDefault();

            const payload = {
                name: document.getElementById('productName').value.trim(),
                slug: document.getElementById('productSlug').value.trim(),
                category: document.getElementById('productCategory').value.trim(),
                description: document.getElementById('productDescription').value.trim(),
                price: Number(document.getElementById('productPrice').value),
                stock: Number(document.getElementById('productStock').value),
                image: document.getElementById('productImage').value.trim(),
                inStock: Number(document.getElementById('productStock').value) > 0
            };

            const url = editingId ? `${API_BASE_URL}/products/${editingId}` : `${API_BASE_URL}/products`;
            const method = editingId ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method,
                headers: getHeaders(),
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (!response.ok || !result.success) {
                alert(result.message || 'Could not save product');
                return;
            }

            closeModal();
            loadProducts();
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;

            const response = await fetch(`${API_BASE_URL}/products/${id}`, {
                method: 'DELETE',
                headers: getHeaders()
            });

            const result = await response.json();
            if (!response.ok || !result.success) {
                alert(result.message || 'Could not delete product');
                return;
            }

            loadProducts();
        }

        document.getElementById('productForm').addEventListener('submit', saveProduct);
        loadProducts();
    </script>
</body>
</html>
