<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - BellaBliss Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 20px;
        }
        
        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 20px;
        }
        
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }
        
        .sidebar a:hover {
            background-color: #e11d48;
        }
        
        .sidebar a.active {
            background-color: #e11d48;
        }
        
        .main-content {
            margin-left: 250px;
            padding: 20px;
        }
        
        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .btn-primary {
            background: #e11d48;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            background: #be123c;
        }
        
        .btn-edit {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            color: #666;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-warning {
            background: #fed7aa;
            color: #92400e;
        }
        
        .badge-danger {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .modal-content label {
            font-weight: 500;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-cancel {
            background: #6b7280;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-save {
            background: #e11d48;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>BellaBliss Admin</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html" class="active">Products</a>
        <a href="services.html">Services</a>
        <a href="orders.html">Orders</a>
        <a href="bookings.html">Bookings</a>
        <a href="users.html">Users</a>
        <a href="professionals.html">Professionals</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <div>
                <h1 style="font-size: 24px;">Products Management</h1>
                <p style="color: #666;">Add, edit, or remove products</p>
            </div>
            <button class="btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus"></i> Add New Product
            </button>
        </div>

        <!-- Search and Filter -->
        <div style="background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px;">
                <input type="text" placeholder="Search products..." style="padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                <select style="padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <option>All Categories</option>
                    <option>Makeup</option>
                    <option>Skincare</option>
                    <option>Haircare</option>
                    <option>Fragrance</option>
                </select>
                <select style="padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                    <option>All Status</option>
                    <option>In Stock</option>
                    <option>Low Stock</option>
                    <option>Out of Stock</option>
                </select>
                <button class="btn-primary">Search</button>
            </div>
        </div>

        <!-- Products Table -->
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add New Product</h3>
            
            <form id="productForm" onsubmit="saveProduct(event)">
                <div>
                    <label>Product Name</label>
                    <input type="text" id="productName" required>
                </div>
                
                <div>
                    <label>Category</label>
                    <select id="productCategory" required>
                        <option value="">Select Category</option>
                        <option value="Makeup">Makeup</option>
                        <option value="Skincare">Skincare</option>
                        <option value="Haircare">Haircare</option>
                        <option value="Fragrance">Fragrance</option>
                    </select>
                </div>
                
                <div>
                    <label>Description</label>
                    <textarea id="productDescription" rows="3" required></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label>Price ($)</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div>
                        <label>Stock Quantity</label>
                        <input type="number" id="productStock" required>
                    </div>
                </div>
                
                <div>
                    <label>Image URL</label>
                    <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample products data
        let products = [
            {
                id: 1,
                name: 'Matte Lipstick - Ruby Red',
                category: 'Makeup',
                price: 29.99,
                stock: 45,
                status: 'in-stock',
                image: 'https://via.placeholder.com/50'
            },
            {
                id: 2,
                name: 'Hydrating Face Cream',
                category: 'Skincare',
                price: 34.99,
                stock: 12,
                status: 'low-stock',
                image: 'https://via.placeholder.com/50'
            },
            {
                id: 3,
                name: 'Volume Mascara',
                category: 'Makeup',
                price: 24.99,
                stock: 0,
                status: 'out-of-stock',
                image: 'https://via.placeholder.com/50'
            }
        ];

        let editingId = null;

        // Load products on page load
        window.onload = function() {
            displayProducts();
        };

        // Display products in table
        function displayProducts() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = '';

            products.forEach(product => {
                const row = document.createElement('tr');
                
                // Determine status badge class
                let statusClass = 'badge-success';
                let statusText = 'In Stock';
                
                if (product.status === 'low-stock') {
                    statusClass = 'badge-warning';
                    statusText = 'Low Stock';
                } else if (product.status === 'out-of-stock') {
                    statusClass = 'badge-danger';
                    statusText = 'Out of Stock';
                }

                row.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${product.image}" alt="${product.name}" style="width: 40px; height: 40px; border-radius: 5px;">
                            <div>
                                <div style="font-weight: 500;">${product.name}</div>
                                <div style="font-size: 12px; color: #666;">ID: ${product.id}</div>
                            </div>
                        </div>
                    </td>
                    <td>${product.category}</td>
                    <td>$${product.price}</td>
                    <td>${product.stock}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editProduct(${product.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-delete" onclick="deleteProduct(${product.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
        }

        // Open modal for adding new product
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').style.display = 'flex';
        }

        // Open modal for editing product
        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                editingId = id;
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productImage').value = product.image;
                document.getElementById('productModal').style.display = 'flex';
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        // Save product (add or update)
        function saveProduct(event) {
            event.preventDefault();

            // Get form values
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const description = document.getElementById('productDescription').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const stock = parseInt(document.getElementById('productStock').value);
            const image = document.getElementById('productImage').value || 'https://via.placeholder.com/50';

            // Determine status based on stock
            let status = 'in-stock';
            if (stock === 0) {
                status = 'out-of-stock';
            } else if (stock < 10) {
                status = 'low-stock';
            }

            if (editingId) {
                // Update existing product
                const index = products.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    products[index] = {
                        ...products[index],
                        name,
                        category,
                        description,
                        price,
                        stock,
                        status,
                        image
                    };
                    alert('Product updated successfully!');
                }
            } else {
                // Add new product
                const newProduct = {
                    id: products.length + 1,
                    name,
                    category,
                    description,
                    price,
                    stock,
                    status,
                    image
                };
                products.push(newProduct);
                alert('Product added successfully!');
            }

            // Refresh display and close modal
            displayProducts();
            closeModal();
        }

        // Delete product
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                products = products.filter(p => p.id !== id);
                displayProducts();
                alert('Product deleted successfully!');
            }
        }

        // Logout function (optional)
        function logout() {
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
