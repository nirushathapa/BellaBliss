<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Services - BellaBliss Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Admin Navigation (same as dashboard) -->
    
    <!-- Main Content -->
    <main class="pt-16">
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Manage Services</h1>
                <button onclick="showServiceModal()" class="bg-rose-600 text-white px-4 py-2 rounded hover:bg-rose-700">
                    <i class="fas fa-plus mr-2"></i>Add New Service
                </button>
            </div>
            
            <!-- Services Grid -->
            <div id="servicesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Services will be loaded here -->
            </div>
        </div>
    </main>
    
    <!-- Service Modal -->
    <div id="serviceModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto">
            <h3 class="text-xl font-semibold mb-4" id="modalTitle">Add New Service</h3>
            
            <form id="serviceForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">Service Name</label>
                    <input type="text" id="serviceName" class="w-full border rounded px-3 py-2">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Category</label>
                    <select id="serviceCategory" class="w-full border rounded px-3 py-2">
                        <option value="Makeup">Makeup</option>
                        <option value="Hair">Hair</option>
                        <option value="Facial">Facial</option>
                        <option value="Nail">Nail</option>
                        <option value="Bridal">Bridal</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Description</label>
                    <textarea id="serviceDescription" rows="3" class="w-full border rounded px-3 py-2"></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2">Studio Price ($)</label>
                        <input type="number" id="studioPrice" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Home Price ($)</label>
                        <input type="number" id="homePrice" class="w-full border rounded px-3 py-2">
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Duration (minutes)</label>
                    <input type="number" id="duration" class="w-full border rounded px-3 py-2">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Service Image URL</label>
                    <input type="url" id="serviceImage" class="w-full border rounded px-3 py-2">
                </div>
                
                <div class="flex justify-end space-x-2 pt-4">
                    <button type="button" onclick="hideServiceModal()" class="px-4 py-2 border rounded hover:bg-gray-100">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 bg-rose-600 text-white rounded hover:bg-rose-700">
                        Save Service
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function showServiceModal() {
            document.getElementById('serviceModal').classList.remove('hidden');
            document.getElementById('serviceModal').classList.add('flex');
        }
        
        function hideServiceModal() {
            document.getElementById('serviceModal').classList.add('hidden');
            document.getElementById('serviceModal').classList.remove('flex');
        }
        
        function editService(serviceId) {
            document.getElementById('modalTitle').textContent = 'Edit Service';
            showServiceModal();
            // Load service data
        }
        
        function deleteService(serviceId) {
            if (confirm('Are you sure you want to delete this service?')) {
                // Delete service
            }
        }
    </script>
</body>
</html>
