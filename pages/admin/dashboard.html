<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BellaBliss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100">
    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h1 class="text-2xl font-bold mb-8">BellaBliss Admin</h1>
            <nav class="space-y-3">
                <a href="dashboard.html" class="block bg-rose-600 px-4 py-2 rounded">Dashboard</a>
                <a href="products.html" class="block hover:bg-slate-800 px-4 py-2 rounded">Products</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold">Admin Dashboard</h2>
                    <p class="text-slate-500">Live overview from your backend</p>
                </div>
                <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded">Logout</button>
            </div>

            <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-10">
                <div class="bg-white rounded-xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Revenue</p>
                    <p class="text-3xl font-bold text-rose-600" id="totalRevenue">$0.00</p>
                </div>
                <div class="bg-white rounded-xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Orders</p>
                    <p class="text-3xl font-bold text-rose-600" id="totalOrders">0</p>
                </div>
                <div class="bg-white rounded-xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Bookings</p>
                    <p class="text-3xl font-bold text-rose-600" id="totalBookings">0</p>
                </div>
                <div class="bg-white rounded-xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Users</p>
                    <p class="text-3xl font-bold text-rose-600" id="totalUsers">0</p>
                </div>
            </section>

            <section class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-6 py-4 border-b">
                    <h3 class="text-xl font-semibold">Recent Orders</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="text-left px-6 py-3">Order</th>
                                <th class="text-left px-6 py-3">Items</th>
                                <th class="text-left px-6 py-3">Total</th>
                                <th class="text-left px-6 py-3">Status</th>
                                <th class="text-left px-6 py-3">Payment</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        }

        async function loadAdminDashboard() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');

            if (!token || !user || user.role !== 'admin') {
                window.location.href = '../auth/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/admin/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await response.json();

                if (!response.ok || !result.success) {
                    throw new Error(result.message || 'Failed to load admin dashboard');
                }

                const data = result.data;
                document.getElementById('totalRevenue').textContent = `$${Number(data.totalRevenue).toFixed(2)}`;
                document.getElementById('totalOrders').textContent = data.totalOrders;
                document.getElementById('totalBookings').textContent = data.totalBookings;
                document.getElementById('totalUsers').textContent = data.totalUsers;

                document.getElementById('recentOrders').innerHTML = (data.recentOrders || []).map(order => `
                    <tr class="border-t">
                        <td class="px-6 py-4">#${order._id}</td>
                        <td class="px-6 py-4">${order.items?.length || 0} items</td>
                        <td class="px-6 py-4">$${Number(order.totalAmount).toFixed(2)}</td>
                        <td class="px-6 py-4 capitalize">${order.status}</td>
                        <td class="px-6 py-4 capitalize">${order.paymentMethod}</td>
                    </tr>
                `).join('') || '<tr><td class="px-6 py-4 text-slate-500" colspan="5">No orders yet</td></tr>';
            } catch (error) {
                console.error(error);
                document.getElementById('recentOrders').innerHTML = '<tr><td class="px-6 py-4 text-red-500" colspan="5">Could not load dashboard data</td></tr>';
            }
        }

        loadAdminDashboard();
    </script>
</body>
</html>
