<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Appointments - BellaBliss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-900 text-white">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex gap-6 items-center">
                <a href="dashboard.html" class="font-bold text-xl">BellaBliss Pro</a>
                <a href="appointments.html" class="text-rose-400">My Appointments</a>
                <a href="availability.html">Availability</a>
            </div>
            <div class="flex items-center gap-4">
                <span id="professionalName">Professional</span>
                <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">My Appointments</h1>
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left">Date</th>
                        <th class="px-6 py-3 text-left">Time</th>
                        <th class="px-6 py-3 text-left">Customer</th>
                        <th class="px-6 py-3 text-left">Service</th>
                        <th class="px-6 py-3 text-left">Location</th>
                        <th class="px-6 py-3 text-left">Amount</th>
                        <th class="px-6 py-3 text-left">Status</th>
                        <th class="px-6 py-3 text-left">Action</th>
                    </tr>
                </thead>
                <tbody id="appointmentsList"></tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let appointments = [];

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../auth/login.html';
        }

        async function loadAppointments() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || 'null');

            if (!token || !user || user.role !== 'professional') {
                window.location.href = '../auth/login.html';
                return;
            }

            document.getElementById('professionalName').textContent = user.name;

            const response = await fetch(`${API_BASE_URL}/professional/bookings`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            const result = await response.json();

            if (!response.ok || !result.success) {
                document.getElementById('appointmentsList').innerHTML = '<tr><td class="px-6 py-4 text-red-500" colspan="8">Could not load appointments</td></tr>';
                return;
            }

            appointments = result.data || [];
            renderAppointments();
        }

        function renderAppointments() {
            const tbody = document.getElementById('appointmentsList');
            tbody.innerHTML = appointments.map(appointment => `
                <tr class="border-t">
                    <td class="px-6 py-4">${appointment.date}</td>
                    <td class="px-6 py-4">${appointment.time}</td>
                    <td class="px-6 py-4">${appointment.userName || 'Customer'}</td>
                    <td class="px-6 py-4">${appointment.service}</td>
                    <td class="px-6 py-4">${appointment.location}</td>
                    <td class="px-6 py-4">$${Number(appointment.total).toFixed(2)}</td>
                    <td class="px-6 py-4 capitalize">${appointment.status}</td>
                    <td class="px-6 py-4">
                        <select onchange="updateStatus('${appointment._id}', this.value)" class="border rounded px-2 py-1">
                            <option value="pending" ${appointment.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="confirmed" ${appointment.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                            <option value="completed" ${appointment.status === 'completed' ? 'selected' : ''}>Completed</option>
                            <option value="cancelled" ${appointment.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                </tr>
            `).join('') || '<tr><td class="px-6 py-4 text-slate-500" colspan="8">No appointments found</td></tr>';
        }

        async function updateStatus(id, status) {
            const response = await fetch(`${API_BASE_URL}/professional/bookings/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ status })
            });

            const result = await response.json();
            if (!response.ok || !result.success) {
                alert(result.message || 'Could not update status');
                return;
            }

            loadAppointments();
        }

        loadAppointments();
    </script>
</body>
</html>
